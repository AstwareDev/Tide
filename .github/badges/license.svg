<svg xmlns="http://www.w3.org/2000/svg" width="348" height="100" viewBox="0 0 348 100" role="img" aria-label="License: MIT">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a40"/>
      <stop offset="0.12" stop-color="#202024"/>
      <stop offset="0.55" stop-color="#0d0d0f"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect x="14" y="12" width="320" height="72" rx="20" fill="url(#bg)" filter="url(#lift)"/>
  <rect x="14.75" y="12.75" width="318.5" height="70.5" rx="19.25" fill="none" stroke="url(#border)" stroke-width="1.5"/>
  <rect x="20" y="16" width="308" height="30" rx="16" fill="url(#gloss)"/>
  <rect x="138" y="30" width="1.3" height="36" fill="url(#divider)"/>
  <text x="46" y="53" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="500" letter-spacing="3.5" fill="#8b8b90">LICENSE</text>
  <circle cx="166" cy="48" r="5" fill="url(#gold)"/>
  <text x="182" y="56" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="24" font-weight="700" letter-spacing="2.5" fill="#ffffff">MIT</text>
</svg>
